<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" role="img" aria-label="agent-secrets — machine-wide secrets for coding agents, encrypted at rest and injected just-in-time, names-only">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#10151c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.16" cy="0.30" r="0.7">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e3b341"/>
      <stop offset="1" stop-color="#d4af37"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" rx="16" fill="url(#bg)"/>
  <rect width="1280" height="360" rx="16" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1279" height="359" rx="16" fill="none" stroke="#30363d"/>

  <!-- wordmark -->
  <text x="72" y="120" font-size="58" font-weight="700" fill="#f0f6fc" letter-spacing="-1">agent<tspan fill="url(#gold)">-secrets</tspan></text>
  <rect x="74" y="140" width="300" height="4" rx="2" fill="url(#gold)"/>

  <!-- tagline -->
  <text x="74" y="188" font-size="22" fill="#e6edf3">Machine-wide secrets for coding agents.</text>
  <text x="74" y="220" font-size="22" fill="#8b949e">Encrypted · just-in-time · <tspan fill="#3fb950" font-weight="700">names-only</tspan>.</text>

  <!-- capability chips -->
  <g font-size="15" fill="#c9d1d9">
    <g transform="translate(74,262)">
      <rect width="118" height="34" rx="17" fill="#161b22" stroke="#30363d"/>
      <text x="59" y="22" text-anchor="middle">sops + age</text>
    </g>
    <g transform="translate(202,262)">
      <rect width="150" height="34" rx="17" fill="#161b22" stroke="#30363d"/>
      <text x="75" y="22" text-anchor="middle">JIT injection</text>
    </g>
    <g transform="translate(362,262)">
      <rect width="228" height="34" rx="17" fill="#161b22" stroke="#30363d"/>
      <text x="114" y="22" text-anchor="middle">one-command reversible</text>
    </g>
    <g transform="translate(600,262)">
      <rect width="176" height="34" rx="17" fill="#161b22" stroke="#30363d"/>
      <text x="88" y="22" text-anchor="middle">$0 · zero vendor</text>
    </g>
  </g>

  <!-- mini terminal card -->
  <g transform="translate(792,64)">
    <rect width="416" height="232" rx="12" fill="#0b0f14" stroke="#30363d"/>
    <circle cx="26" cy="26" r="6" fill="#ff6b6b"/>
    <circle cx="48" cy="26" r="6" fill="#e3b341"/>
    <circle cx="70" cy="26" r="6" fill="#3fb950"/>
    <text x="208" y="31" text-anchor="middle" font-size="13" fill="#6e7681">agent-secrets</text>
    <line x1="0" y1="52" x2="416" y2="52" stroke="#30363d"/>
    <g font-size="16">
      <text x="26" y="88"><tspan fill="#e3b341">❯</tspan><tspan fill="#c9d1d9"> agent-secrets list</tspan></text>
      <text x="26" y="120" fill="#8b949e">Secrets (names only):</text>
      <text x="42" y="148"><tspan fill="#3fb950">•</tspan><tspan fill="#e6edf3"> ANTHROPIC_API_KEY</tspan></text>
      <text x="42" y="172"><tspan fill="#3fb950">•</tspan><tspan fill="#e6edf3"> OPENAI_API_KEY</tspan></text>
      <text x="26" y="204"><tspan fill="#e3b341">❯</tspan><tspan fill="#c9d1d9"> …run -- </tspan><tspan fill="#6e7681">| wc -c → </tspan><tspan fill="#3fb950">49</tspan><tspan fill="#6e7681">  ✓ never shown</tspan></text>
    </g>
  </g>
</svg>
