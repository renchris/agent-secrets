name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    # macos-15 only at v0.1; macos-14 joins the matrix at the public-visibility flip.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: brew install shellcheck bats-core age sops

      - name: ShellCheck (all shell sources)
        run: |
          find bin cmd lib scripts install.sh -type f ! -name '*.mjs' -print0 | xargs -0 shellcheck

      - name: Zero-telemetry / no-exfil gate
        run: scripts/telemetry-gate.sh

      - name: Bats behavior suite (synthetic-HOME isolated)
        run: bats -r tests

      - name: Visual assets present
        run: |
          for a in assets/demo.gif assets/hero.svg assets/demo.tape \
                   assets/diagrams/injection.mmd assets/diagrams/custody.mmd assets/diagrams/reversible.mmd; do
            if [ -f "$a" ]; then echo "✓ $a"; else echo "::error::missing visual asset $a"; exit 1; fi
          done

      - name: Demo asset carries no secret values (names-only)
        run: |
          # the tape/script must never embed a real-looking secret; only fake placeholders
          if grep -RInE 'sk-ant-[A-Za-z0-9]{20}|AGE-SECRET-KEY-1[A-Z0-9]{20}' assets/ ; then
            echo "::error::possible secret value in assets/"; exit 1
          fi
          echo "assets clean (names-only)"
